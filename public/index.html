<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Notebook Homepage Template</title>
		<link rel="icon" href="./favicon.png" type="image/png" />
		<link rel="alternate" hreflang="zh" href="./zh/" />
		<link rel="alternate" hreflang="en" href="./en/" />
		<link rel="alternate" hreflang="x-default" href="./en/" />
		<meta name="description" content="A notebook-style static homepage template." />
		<script>
			(function () {
				var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
				var target = lang.indexOf('zh') === 0 ? './zh/' : './en/';
				location.replace(target);
			})();
		</script>
		<style>
			html,
			body {
				margin: 0;
				min-height: 100%;
				background: #a8d4e6;
			}

			body {
				display: grid;
				place-items: center;
				overflow: hidden;
				font-family: 'Comic Neue', 'LXGW WenKai GB Screen', 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', 'Source Han Sans SC', system-ui, sans-serif;
				color: #2a2a2a;
			}

			.fallback-note {
				width: min(28rem, calc(100vw - 3rem));
				padding: 2rem;
				border-radius: 6px;
				background: #fdfcf7;
				box-shadow: 0 18px 42px rgba(40, 50, 60, 0.2);
				text-align: center;
				transform: rotate(-1deg);
				animation: paperDrop 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
			}

			.fallback-note h1 {
				margin: 0 0 1rem;
				font-size: 1.45rem;
				font-weight: 600;
			}

			.langs {
				display: flex;
				justify-content: center;
				gap: 1rem;
				flex-wrap: wrap;
			}

			.langs a {
				padding: 0.6rem 1.2rem;
				border-radius: 4px;
				background: #fff7fb;
				color: #2a2a2a;
				text-decoration: none;
				box-shadow: 2px 4px 10px rgba(40, 50, 60, 0.14);
				transition: transform 0.2s ease;
			}

			.langs a:hover {
				transform: translateY(-2px);
			}

			@keyframes paperDrop {
				from {
					opacity: 0;
					transform: translateY(-32px) rotate(-3deg);
				}
				to {
					opacity: 1;
					transform: translateY(0) rotate(-1deg);
				}
			}
		</style>
	</head>
	<body>
		<noscript>
			<section class="fallback-note" aria-label="Choose language">
				<h1>Choose a language</h1>
				<div class="langs">
					<a href="./zh/">中文</a>
					<a href="./en/">English</a>
				</div>
			</section>
		</noscript>
	</body>
</html>
